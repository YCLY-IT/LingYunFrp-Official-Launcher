name: Build Private Project and Release

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - "v*"
  
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（例如 v1.0.0）"
        required: true
        type: string
      
      platform:
        description: "选择构建平台"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - macos
          - linux
          - windows
      
      release_title:
        description: "Release 标题（可选，默认使用版本号）"
        required: false
        default: ""
        type: string
      
      release_notes:
        description: "更新说明（推送标签时自动套用模板，手动触发时填写）"
        required: false
        default: ""
        type: string
      
      force_recreate:
        description: "如果 Release 已存在，是否强制更新"
        required: false
        default: false
        type: boolean

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      title: ${{ steps.set-title.outputs.title }}
      notes: ${{ steps.set-notes.outputs.notes }}
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: 拉代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 准备版本信息
        id: set-version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: 准备标题
        id: set-title
        run: |
          if [ -n "${{ inputs.release_title }}" ]; then
            TITLE="${{ inputs.release_title }}"
          else
            TITLE="${{ steps.set-version.outputs.version }}"
          fi
          echo "title=$TITLE" >> $GITHUB_OUTPUT
      
      - name: 生成缓存 key
        id: cache-key
        run: |
          KEY="${{ hashFiles('**/Cargo.lock', '**/pnpm-lock.yaml') }}"
          echo "key=$KEY" >> $GITHUB_OUTPUT
          
      - name: 准备更新说明
        id: set-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.set-version.outputs.version }}"
          BUILD_DATE=$(date '+%Y-%m-%d')
          
          if [ "${{ github.event_name }}" == "push" ]; then
            # 提取 commit
            LAST_RUN=$(gh run list --workflow="Build Private Project and Release" --status=success --limit=1 --json createdAt -q '.[0].createdAt' 2>/dev/null || echo "")
            CHANGES=""
            if [ -n "$LAST_RUN" ]; then
              SINCE=$(date -d "$LAST_RUN" '+%Y-%m-%d %H:%M:%S' 2>/dev/null || echo "")
              [ -n "$SINCE" ] && CHANGES=$(git log --since="$SINCE" --pretty=format:"- %s" --no-merges | head -20)
            fi
            [ -z "$CHANGES" ] && CHANGES=$(git log -10 --pretty=format:"- %s" --no-merges)
            
            # 模板写文件，用占位符
            cat > /tmp/template.txt << 'EOF'
          凌云FRP图形化客户端 {{VERSION}} 正式发布！这是一个基于 Tauri + Vue3 的跨平台内网穿透工具，为用户提供现代化的 FRP 管理体验。
          
          ### ✨ 主要功能
          
          - **图形化配置管理** - 直观易用的界面，轻松管理 FRP 配置
          - **一键启停服务** - 快速启动和停止 FRP 服务
          - **实时日志查看** - 内置日志面板，实时显示运行状态
          - **系统托盘支持** - 最小化到托盘，快捷操作不打扰
          - **自动更新检测** - 自动检查新版本，及时获取更新
          - **多主题切换** - 支持明暗主题，适配不同使用场景
          - **跨平台支持** - 支持 Windows、macOS、Linux 三大平台
          
          ### 📦 下载安装
          
          | 平台 | 架构 | 安装包 |
          |------|------|--------|
          | Windows | x64 | `.msi` / `.exe` / `.zip` |
          | Windows | x86 | `.msi` / `.exe` / `.zip` |
          | Windows | ARM64 | `.msi` / `.exe` / `.zip` |
          | macOS | x64 | `.dmg` / `.app.tar.gz` |
          | macOS | ARM64 | `.dmg` / `.app.tar.gz` |
          | macOS | Universal | `.dmg` / `.app.tar.gz` |
          | Linux | x64 | `.deb` / `.AppImage` / `.rpm` / `.tar.gz` |
          | Linux | ARM64 | `.deb` / `.AppImage` / `.rpm` / `.tar.gz` |
          
          ### 🔧 系统要求
          
          - **Windows**: Windows 10 及以上
          - **macOS**: macOS 11 及以上
          - **Linux**: Ubuntu 20.04+ / Debian 11+ / Fedora 35+
          
          ### 📝 安装指南
          
          **Debian/Ubuntu:**
          ```bash
          sudo dpkg -i 凌云FRP_{{VERSION}}_amd64.deb
          sudo apt-get install -f
          ```
          
          **其他平台下载对应安装包直接安装**
          
          ### ⚠️ 注意事项
          
          - Windows: SmartScreen 提示时点击"仍要运行"
          - macOS: Gatekeeper 提示时前往"隐私与安全性"授权
          - Linux: AppImage 需要 `chmod +x` 赋予执行权限
          
          ### 🔄 更新日志
          
          **{{VERSION}} ({{BUILD_DATE}})**
          {{CHANGES}}
          
          ### 📋 反馈与支持
          
          - 🌐 官网：https://www.lyfrp.cn
          - 🐛 问题反馈：https://github.com/YCLY-IT/LingYunFrp-Official-Launcher/issues
          - 💬 社区讨论：https://github.com/YCLY-IT/LingYunFrp-Official-Launcher/discussions
          - 📧 邮箱：1263115878@qq.com
          - 💬 QQ群：882670857
          
          **感谢使用凌云FRP！**
          EOF

            # 替换占位符
            NOTES=$(cat /tmp/template.txt | sed "s/{{VERSION}}/${VERSION}/g" | sed "s/{{BUILD_DATE}}/${BUILD_DATE}/g" | sed "s/{{CHANGES}}/${CHANGES}/g")
            
          elif [ -n "${{ inputs.release_notes }}" ]; then
            NOTES="${{ inputs.release_notes }}"
          else
            NOTES="手动构建 ${VERSION}"
          fi
          
          # 输出
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build-macos:
    needs: prepare
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'macos' }}
    runs-on: macos-latest
    steps:
      - name: 拉代码
        uses: actions/checkout@v4
        with:
          repository: YCLY-IT/LingYunFrp-Client-Launcher
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - name: 缓存 Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ needs.prepare.outputs.cache-key }}-macos
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      
      - name: 缓存 Tauri
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: tauri-macos-${{ needs.prepare.outputs.cache-key }}
          restore-keys: tauri-macos-
      
      - name: 装依赖
        run: pnpm install
        
      - name: 装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: 编 Universal
        run: pnpm run tauri build --target universal-apple-darwin
        
      - name: 改文件名
        run: |
          cd src-tauri/target/universal-apple-darwin/release/bundle/dmg
          for f in *.dmg; do mv "$f" "${f%.dmg}_universal.dmg"; done

      - name: 收包
        run: |
          mkdir -p ./release-upload/macos
          cp src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg ./release-upload/macos/
          cp src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz ./release-upload/macos/ 2>/dev/null || true

      - name: 传产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-all
          path: ./release-upload/macos/*
          retention-days: 1

  build-linux-x64:
    needs: prepare
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'linux' }}
    runs-on: ubuntu-22.04
    steps:
      - name: 拉代码
        uses: actions/checkout@v4
        with:
          repository: YCLY-IT/LingYunFrp-Client-Launcher
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - name: 缓存 Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ needs.prepare.outputs.cache-key }}-linux-x64
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      
      - name: 缓存 Tauri
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: tauri-linux-x64-${{ needs.prepare.outputs.cache-key }}
          restore-keys: tauri-linux-x64-
      
      - name: 装依赖
        run: pnpm install

      - name: 装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: 装系统库
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libglib2.0-dev libsoup-3.0-dev pkg-config \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: 编 x64
        run: pnpm run tauri build --target x86_64-unknown-linux-gnu

      - name: 收包
        run: |
          mkdir -p ./release-upload/linux-x64
          for dir in deb appimage rpm tar.gz; do
            cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/${dir}/* ./release-upload/linux-x64/ 2>/dev/null || true
          done

      - name: 传产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: ./release-upload/linux-x64/*
          retention-days: 1
          
  build-linux-arm64:
    needs: prepare
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'linux' }}
    runs-on: ubuntu-22.04
    steps:
      - name: 拉代码
        uses: actions/checkout@v4
        with:
          repository: YCLY-IT/LingYunFrp-Client-Launcher
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - name: 缓存 Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ needs.prepare.outputs.cache-key }}-linux-arm64
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      
      - name: 缓存 Tauri
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: tauri-linux-arm64-${{ needs.prepare.outputs.cache-key }}
          restore-keys: tauri-linux-arm64-
      
      - name: 安装项目依赖
        run: pnpm install
  
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
  
      - name: 配置 ARM64 交叉编译环境
        run: |
          # 备份源列表
          sudo cp /etc/apt/sources.list /etc/apt/sources.list.bak
          # 配置源（单行）
          echo -e "deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse\ndeb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse\ndeb [arch=amd64] http://security.ubuntu.com/ubuntu jammy-security main restricted universe multiverse\ndeb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse\ndeb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse\ndeb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse" | sudo tee /etc/apt/sources.list > /dev/null
          # 添加 ARM64 架构
          sudo dpkg --add-architecture arm64
          # 更新源
          sudo apt-get update -y || true
          # 安装依赖（单行，无 appindicator）
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross patchelf pkg-config jq libglib2.0-dev:arm64 libgtk-3-dev:arm64 libsoup-3.0-dev:arm64 libwebkit2gtk-4.1-dev:arm64 librsvg2-dev:arm64 libssl-dev:arm64
          # 修复路径
          sudo mkdir -p /usr/aarch64-linux-gnu/usr/lib/aarch64-linux-gnu/ && sudo ln -s /usr/aarch64-linux-gnu/lib/ /usr/aarch64-linux-gnu/usr/lib/aarch64-linux-gnu/ 2>/dev/null || true
  
      - name: 配置编译环境（强制跳过 appindicator）
        run: |
          mkdir -p ~/.cargo
          echo -e "[target.aarch64-unknown-linux-gnu]\nlinker = \"aarch64-linux-gnu-gcc\"" | tee ~/.cargo/config.toml > /dev/null
          # 核心：新增 RUSTFLAGS 跳过系统托盘编译
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "TAURI_SKIP_APPINDICATOR=1" >> $GITHUB_ENV
          echo "RUSTFLAGS=--cfg=tauri_no_tray" >> $GITHUB_ENV  # 强制禁用托盘
  
      - name: 修复 tauri.conf.json（禁用托盘）
        run: |
          # 验证 JSON 格式
          if ! jq . src-tauri/tauri.conf.json; then
            sed -i 's/,\s*}/}/g' src-tauri/tauri.conf.json
            sed -i 's/,\s*]/]/g' src-tauri/tauri.conf.json
          fi
          # 1. 禁用系统托盘
          jq '.tauri.systemTray.enabled = false' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
          # 2. 仅构建 deb 包
          jq '.bundle.targets = ["deb"]' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
  
      - name: 编译 ARM64（无托盘）
        run: |
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          export PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu
          export TAURI_SKIP_APPINDICATOR=1
          export RUSTFLAGS=--cfg=tauri_no_tray  # 关键：禁用托盘编译
          pnpm run tauri build --target aarch64-unknown-linux-gnu
  
      - name: 收集产物
        run: |
          mkdir -p ./release-upload/linux-arm64
          find src-tauri/target -name "*.deb" -path "*/aarch64-unknown-linux-gnu/*" -exec cp {} ./release-upload/linux-arm64/ \;
          ls -la ./release-upload/linux-arm64/
  
      - name: 上传 ARM64 产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: ./release-upload/linux-arm64/*
          retention-days: 1
          
  merge-linux:
    needs: [build-linux-x64, build-linux-arm64]
    if: ${{ always() }}  # 即使某个架构编译失败，仍执行合并
    runs-on: ubuntu-latest
    steps:
      - name: 创建产物目录
        run: mkdir -p ./release-upload/linux
  
      - name: 下载 x64 产物（容错：不存在则跳过）
        uses: actions/download-artifact@v4
        if: ${{ needs.build-linux-x64.result == 'success' }}
        with:
          name: linux-x64
          path: ./release-upload/linux
      
      - name: 下载 ARM64 产物（容错：不存在则跳过）
        uses: actions/download-artifact@v4
        if: ${{ needs.build-linux-arm64.result == 'success' }}
        with:
          name: linux-arm64
          path: ./release-upload/linux
  
      - name: 传合并产物（即使为空也上传，避免后续报错）
        uses: actions/upload-artifact@v4
        with:
          name: linux-all
          path: ./release-upload/linux/*
          retention-days: 1

  build-windows:
    needs: prepare
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - name: 拉代码
        uses: actions/checkout@v4
        with:
          repository: YCLY-IT/LingYunFrp-Client-Launcher
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - name: 缓存 Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ needs.prepare.outputs.cache-key }}-windows
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      
      - name: 缓存 Tauri
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: tauri-windows-${{ needs.prepare.outputs.cache-key }}
          restore-keys: tauri-windows-
      
      - name: 装依赖
        run: pnpm install
  
      - name: 装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc,i686-pc-windows-msvc,aarch64-pc-windows-msvc
  
      - name: 串行编译 Windows 各架构（稳定优先）
        shell: pwsh
        run: |
          # 串行编译，避免资源冲突
          Write-Host "编译 x64 架构..."
          pnpm run tauri build --target x86_64-pc-windows-msvc
          
          Write-Host "编译 x86 架构..."
          pnpm run tauri build --target i686-pc-windows-msvc
          
          Write-Host "编译 ARM64 架构..."
          pnpm run tauri build --target aarch64-pc-windows-msvc
  
      - name: 收包
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./release-upload/windows
          # 收集所有 Windows 产物（容错）
          Get-ChildItem "src-tauri/target/" -Recurse -Include *.msi,*.exe,*.zip | 
            Where-Object { $_.FullName -match "x86_64|i686|aarch64" } |
            Copy-Item -Destination ./release-upload/windows/ -ErrorAction SilentlyContinue
  
      - name: 传产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-all
          path: ./release-upload/windows/*
          retention-days: 1
          
  release:
    needs: [prepare, build-macos, merge-linux, build-windows]
    if: |
      always() && 
      (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped') &&
      (needs.merge-linux.result == 'success' || needs.merge-linux.result == 'skipped') &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: 删旧 Release
        if: ${{ inputs.force_recreate == true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          gh release delete "$VERSION" --yes 2>/dev/null || true
          git push origin :refs/tags/$VERSION 2>/dev/null || true

      - name: 发 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.title }}
          body: ${{ needs.prepare.outputs.notes }}
          files: ./artifacts/**/*
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, 'beta') || contains(needs.prepare.outputs.version, 'alpha') || contains(needs.prepare.outputs.version, 'rc') }}
          generate_release_notes: false
