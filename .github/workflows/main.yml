name: Build Private Project and Release

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - "v*"
  
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（例如 v1.0.0）"
        required: true
        type: string
      
      platform:
        description: "选择构建平台"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - macos
          - linux
          - windows
      
      release_title:
        description: "Release 标题（可选，默认使用版本号）"
        required: false
        default: ""
        type: string
      
      # 改为 string 类型，多行用 \n 分隔
      release_notes:
        description: "更新说明（支持 \\n 换行，例如：修复Bug\\n优化性能）"
        required: false
        default: ""
        type: string
      
      force_recreate:
        description: "如果 Release 已存在，是否强制更新"
        required: false
        default: false
        type: boolean

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      title: ${{ steps.set-title.outputs.title }}
      notes: ${{ steps.set-notes.outputs.notes }}
    steps:
      - name: 确定版本号
        id: set-version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "构建版本: $VERSION"
      
      - name: 确定 Release 标题
        id: set-title
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            TITLE="${{ steps.set-version.outputs.version }}"
          elif [ -n "${{ inputs.release_title }}" ]; then
            TITLE="${{ inputs.release_title }}"
          else
            TITLE="${{ inputs.version }}"
          fi
          echo "title=$TITLE" >> $GITHUB_OUTPUT
      
      - name: 确定更新说明
        id: set-notes
        run: |
          BUILD_TIME=$(date +'%Y-%m-%d %H:%M:%S')
          
          if [ "${{ github.event_name }}" == "push" ]; then
            NOTES="自动构建发布 - 时间：${BUILD_TIME}"
          elif [ -n "${{ inputs.release_notes }}" ]; then
            # 将输入的 \n 转换为真实换行
            NOTES=$(echo "${{ inputs.release_notes }}" | sed 's/\\n/\n/g')
          else
            NOTES="手动构建发布 - 时间：${BUILD_TIME}"
          fi
          
          # 使用多行输出
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build-macos:
    needs: prepare
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'macos' }}
    runs-on: macos-latest
    steps:
      - name: 拉取私有仓库代码
        uses: actions/checkout@v4
        with:
          repository: YCLY-IT/LingYunFrp-Client-Launcher
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          
      - name: 安装依赖
        run: pnpm install
        
      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: 构建 Intel 版本 (x64)
        run: pnpm run tauri build --target x86_64-apple-darwin
        
      - name: 重命名 x64 安装包
        run: |
          cd src-tauri/target/x86_64-apple-darwin/release/bundle/dmg
          for f in *.dmg; do 
            new_f=$(echo "$f" | sed 's/^FRP/LingYunFrpLauncher/' | sed 's/\.dmg/_x64.dmg/')
            mv "$f" "$new_f"
          done

      - name: 构建 Apple Silicon 版本 (ARM64)
        run: pnpm run tauri build --target aarch64-apple-darwin
        
      - name: 重命名 ARM64 安装包
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/dmg
          for f in *.dmg; do 
            new_f=$(echo "$f" | sed 's/^FRP/LingYunFrpLauncher/' | sed 's/\.dmg/_aarch64.dmg/')
            mv "$f" "$new_f"
          done

      - name: 构建通用版本 (Universal)
        run: pnpm run tauri build --target universal-apple-darwin
        
      - name: 重命名 Universal 安装包
        run: |
          cd src-tauri/target/universal-apple-darwin/release/bundle/dmg
          for f in *.dmg; do 
            new_f=$(echo "$f" | sed 's/^FRP/LingYunFrpLauncher/' | sed 's/\.dmg/_universal.dmg/')
            mv "$f" "$new_f"
          done

      - name: 打包 macOS 产物
        run: |
          mkdir -p ./release-upload/macos
          for target in x86_64-apple-darwin aarch64-apple-darwin universal-apple-darwin; do
            for f in src-tauri/target/${target}/release/bundle/dmg/*.dmg; do
              [ -f "$f" ] && cp "$f" ./release-upload/macos/
            done
            for f in src-tauri/target/${target}/release/bundle/macos/*.app.tar.gz; do
              if [ -f "$f" ]; then
                new_f=$(echo "$f" | sed 's/^FRP/LingYunFrpLauncher/')
                cp "$f" ./release-upload/macos/"$(basename "$new_f")"
              fi
            done
          done

      - name: 上传 macOS 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-all
          path: ./release-upload/macos/*
          retention-days: 1

  build-linux:
    needs: prepare
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'linux' }}
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取私有仓库代码
        uses: actions/checkout@v4
        with:
          repository: YCLY-IT/LingYunFrp-Client-Launcher
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          
      - name: 安装依赖
        run: pnpm install

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - name: 安装 x64 编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libglib2.0-dev libsoup-3.0-dev pkg-config \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: 构建 x64 版本
        run: pnpm run tauri build --target x86_64-unknown-linux-gnu

      # 暂时跳过 ARM64，先保证 x64 能正常工作
      # 后续可以单独修复 ARM64 的 AppImage 打包问题

      - name: 打包 Linux 产物
        run: |
          mkdir -p ./release-upload/linux
          for ext in deb AppImage rpm tar.gz; do
            dir=${ext//./}
            [ "$ext" = "tar.gz" ] && dir="tar.gz"
            for file in src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/${dir}/*.$ext; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                new_filename=$(echo "$filename" | sed 's/^FRP/LingYunFrpLauncher/')
                cp "$file" "./release-upload/linux/$new_filename"
              fi
            done
          done

      - name: 上传 Linux 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-all
          path: ./release-upload/linux/*
          retention-days: 1

  build-windows:
    needs: prepare
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - name: 拉取私有仓库代码
        uses: actions/checkout@v4
        with:
          repository: YCLY-IT/LingYunFrp-Client-Launcher
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          
      - name: 安装依赖
        run: pnpm install

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc,i686-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: 构建 x64 版本
        run: pnpm run tauri build --target x86_64-pc-windows-msvc

      - name: 构建 x86 版本
        run: pnpm run tauri build --target i686-pc-windows-msvc

      - name: 构建 ARM64 版本
        run: pnpm run tauri build --target aarch64-pc-windows-msvc

      - name: 打包 Windows 产物
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./release-upload/windows
          foreach ($target in @("x86_64-pc-windows-msvc", "i686-pc-windows-msvc", "aarch64-pc-windows-msvc")) {
            foreach ($type in @("msi", "nsis")) {
              $ext = if ($type -eq "msi") { "msi" } else { "exe" }
              $bundlePath = "src-tauri/target/$target/release/bundle/$type"
              if (Test-Path $bundlePath) {
                Get-ChildItem "$bundlePath/*.$ext" -ErrorAction SilentlyContinue | ForEach-Object {
                  $newName = $_.Name -replace '^FRP', 'LingYunFrpLauncher'
                  Copy-Item $_.FullName "./release-upload/windows/$newName" -Force
                }
              }
            }
          }

      - name: 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-all
          path: ./release-upload/windows/*
          retention-days: 1

  release:
    needs: [prepare, build-macos, build-linux, build-windows]
    if: |
      always() && 
      (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped') &&
      (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped') &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: 查看产物列表
        run: find ./artifacts -type f

      - name: 删除已存在的 Release（强制更新时）
        if: ${{ inputs.force_recreate == true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          gh release delete "$VERSION" --yes 2>/dev/null || true
          git push origin :refs/tags/$VERSION 2>/dev/null || true

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.title }}
          body: ${{ needs.prepare.outputs.notes }}
          files: ./artifacts/**/*
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, 'beta') || contains(needs.prepare.outputs.version, 'alpha') || contains(needs.prepare.outputs.version, 'rc') }}
          generate_release_notes: false
