**感谢使用凌云FRP！如有任何问题或建议，欢迎反馈。**"
            
          elif [ -n "${{ inputs.release_notes }}" ]; then
            NOTES="${{ inputs.release_notes }}"
          else
            NOTES="手动构建 ${VERSION}"
          fi
          
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build-macos:
    needs: prepare
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'macos' }}
    runs-on: macos-latest
    steps:
      - name: 拉代码
        uses: actions/checkout@v4
        with:
          repository: YCLY-IT/LingYunFrp-Client-Launcher
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - name: 缓存 Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ needs.prepare.outputs.cache-key }}-macos
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      
      - name: 缓存 Tauri
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: tauri-macos-${{ needs.prepare.outputs.cache-key }}
          restore-keys: tauri-macos-
      
      - name: 装依赖
        run: pnpm install
        
      - name: 装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: 编 Universal
        run: pnpm run tauri build --target universal-apple-darwin
        
      - name: 改文件名
        run: |
          cd src-tauri/target/universal-apple-darwin/release/bundle/dmg
          for f in *.dmg; do mv "$f" "${f%.dmg}_universal.dmg"; done

      - name: 收包
        run: |
          mkdir -p ./release-upload/macos
          cp src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg ./release-upload/macos/
          cp src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz ./release-upload/macos/ 2>/dev/null || true

      - name: 传产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-all
          path: ./release-upload/macos/*
          retention-days: 1

  build-linux-x64:
    needs: prepare
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'linux' }}
    runs-on: ubuntu-22.04
    steps:
      - name: 拉代码
        uses: actions/checkout@v4
        with:
          repository: YCLY-IT/LingYunFrp-Client-Launcher
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - name: 缓存 Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ needs.prepare.outputs.cache-key }}-linux-x64
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      
      - name: 缓存 Tauri
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: tauri-linux-x64-${{ needs.prepare.outputs.cache-key }}
          restore-keys: tauri-linux-x64-
      
      - name: 装依赖
        run: pnpm install

      - name: 装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: 装系统库
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libglib2.0-dev libsoup-3.0-dev pkg-config \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: 编 x64
        run: pnpm run tauri build --target x86_64-unknown-linux-gnu

      - name: 收包
        run: |
          mkdir -p ./release-upload/linux-x64
          for dir in deb appimage rpm tar.gz; do
            cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/${dir}/* ./release-upload/linux-x64/ 2>/dev/null || true
          done

      - name: 传产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: ./release-upload/linux-x64/*
          retention-days: 1

  build-linux-arm64:
    needs: prepare
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'linux' }}
    runs-on: ubuntu-22.04
    steps:
      - name: 拉代码
        uses: actions/checkout@v4
        with:
          repository: YCLY-IT/LingYunFrp-Client-Launcher
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - name: 缓存 Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ needs.prepare.outputs.cache-key }}-linux-arm64
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      
      - name: 缓存 Tauri
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: tauri-linux-arm64-${{ needs.prepare.outputs.cache-key }}
          restore-keys: tauri-linux-arm64-
      
      - name: 装依赖
        run: pnpm install

      - name: 装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: 配置 ARM64 环境
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          sudo tee -a /etc/apt/sources.list <<EOF
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
          EOF
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross patchelf
          sudo apt-get install -y libgtk-3-dev:arm64 libwebkit2gtk-4.1-dev:arm64 \
            libayatana-appindicator3-dev:arm64 2>/dev/null || true

      - name: 配置 Cargo
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: 编 ARM64
        run: |
          sed -i 's/"targets": "all"/"targets": "deb"/' src-tauri/tauri.conf.json 2>/dev/null || true
          pnpm run tauri build --target aarch64-unknown-linux-gnu
        env:
          CC: aarch64-linux-gnu-gcc

      - name: 收包
        run: |
          mkdir -p ./release-upload/linux-arm64
          cp src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/* ./release-upload/linux-arm64/ 2>/dev/null || true

      - name: 传产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: ./release-upload/linux-arm64/*
          retention-days: 1

  merge-linux:
    needs: [build-linux-x64, build-linux-arm64]
    if: ${{ always() && (needs.build-linux-x64.result == 'success' || needs.build-linux-arm64.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: 下载 x64
        uses: actions/download-artifact@v4
        with:
          name: linux-x64
          path: ./release-upload/linux
      
      - name: 下载 ARM64
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64
          path: ./release-upload/linux

      - name: 传合并产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-all
          path: ./release-upload/linux/*
          retention-days: 1

  build-windows:
    needs: prepare
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - name: 拉代码
        uses: actions/checkout@v4
        with:
          repository: YCLY-IT/LingYunFrp-Client-Launcher
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - name: 缓存 Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ needs.prepare.outputs.cache-key }}-windows
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      
      - name: 缓存 Tauri
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: tauri-windows-${{ needs.prepare.outputs.cache-key }}
          restore-keys: tauri-windows-
      
      - name: 装依赖
        run: pnpm install

      - name: 装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc,i686-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: 并行编三个架构
        shell: pwsh
        run: |
          $jobs = @()
          $jobs += Start-Job { pnpm run tauri build --target x86_64-pc-windows-msvc }
          $jobs += Start-Job { pnpm run tauri build --target i686-pc-windows-msvc }
          $jobs += Start-Job { pnpm run tauri build --target aarch64-pc-windows-msvc }
          $jobs | Wait-Job | Receive-Job

      - name: 收包
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./release-upload/windows
          foreach ($target in @("x86_64", "i686", "aarch64")) {
            Get-ChildItem "src-tauri/target/${target}-pc-windows-msvc/release/bundle/*/*" -Include *.msi,*.exe,*.zip | 
              Copy-Item -Destination ./release-upload/windows/ -ErrorAction SilentlyContinue
          }

      - name: 传产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-all
          path: ./release-upload/windows/*
          retention-days: 1

  release:
    needs: [prepare, build-macos, merge-linux, build-windows]
    if: |
      always() && 
      (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped') &&
      (needs.merge-linux.result == 'success' || needs.merge-linux.result == 'skipped') &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: 删旧 Release
        if: ${{ inputs.force_recreate == true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          gh release delete "$VERSION" --yes 2>/dev/null || true
          git push origin :refs/tags/$VERSION 2>/dev/null || true

      - name: 发 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.title }}
          body: ${{ needs.prepare.outputs.notes }}
          files: ./artifacts/**/*
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, 'beta') || contains(needs.prepare.outputs.version, 'alpha') || contains(needs.prepare.outputs.version, 'rc') }}
          generate_release_notes: false
