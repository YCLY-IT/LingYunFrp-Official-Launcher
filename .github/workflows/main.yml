name: Build Private Project and Release

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - "v*"
  
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（例如 v1.0.0）"
        required: true
        type: string
      
      platform:
        description: "选择构建平台"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - macos
          - linux
          - windows
      
      release_title:
        description: "Release 标题（可选，默认使用版本号）"
        required: false
        default: ""
        type: string
      
      force_recreate:
        description: "如果 Release 已存在，是否强制更新"
        required: false
        default: false
        type: boolean

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      title: ${{ steps.set-title.outputs.title }}
    steps:
      - name: 准备版本信息
        id: set-version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: 准备标题
        id: set-title
        run: |
          if [ -n "${{ inputs.release_title }}" ]; then
            TITLE="${{ inputs.release_title }}"
          else
            TITLE="${{ steps.set-version.outputs.version }}"
          fi
          echo "title=$TITLE" >> $GITHUB_OUTPUT

  build-macos:
    needs: prepare
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'macos' }}
    runs-on: macos-latest
    steps:
      - name: 拉代码
        uses: actions/checkout@v4
        with:
          repository: YCLY-IT/LingYunFrp-Client-Launcher
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          
      - name: 装依赖
        run: pnpm install
        
      - name: 装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: 编 x64
        run: pnpm run tauri build --target x86_64-apple-darwin
        
      - name: 改 x64 文件名
        run: |
          cd src-tauri/target/x86_64-apple-darwin/release/bundle/dmg
          for f in *.dmg; do mv "$f" "${f%.dmg}_x64.dmg"; done

      - name: 编 ARM64
        run: pnpm run tauri build --target aarch64-apple-darwin
        
      - name: 改 ARM64 文件名
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/dmg
          for f in *.dmg; do mv "$f" "${f%.dmg}_aarch64.dmg"; done

      - name: 编 Universal
        run: pnpm run tauri build --target universal-apple-darwin
        
      - name: 改 Universal 文件名
        run: |
          cd src-tauri/target/universal-apple-darwin/release/bundle/dmg
          for f in *.dmg; do mv "$f" "${f%.dmg}_universal.dmg"; done

      - name: 收 macOS 包
        run: |
          mkdir -p ./release-upload/macos
          cp src-tauri/target/*/release/bundle/dmg/*.dmg ./release-upload/macos/ 2>/dev/null || true
          cp src-tauri/target/*/release/bundle/macos/*.app.tar.gz ./release-upload/macos/ 2>/dev/null || true

      - name: 传 macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-all
          path: ./release-upload/macos/*
          retention-days: 1

  build-linux:
    needs: prepare
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'linux' }}
    runs-on: ubuntu-22.04
    steps:
      - name: 拉代码
        uses: actions/checkout@v4
        with:
          repository: YCLY-IT/LingYunFrp-Client-Launcher
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          
      - name: 装依赖
        run: pnpm install

      - name: 装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: 装系统库
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libglib2.0-dev libsoup-3.0-dev pkg-config \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: 编 x64
        run: pnpm run tauri build --target x86_64-unknown-linux-gnu

      - name: 收 Linux 包
        run: |
          mkdir -p ./release-upload/linux
          for dir in deb appimage rpm tar.gz; do
            cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/${dir}/* ./release-upload/linux/ 2>/dev/null || true
          done

      - name: 传 Linux 产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-all
          path: ./release-upload/linux/*
          retention-days: 1

  build-windows:
    needs: prepare
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - name: 拉代码
        uses: actions/checkout@v4
        with:
          repository: YCLY-IT/LingYunFrp-Client-Launcher
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          
      - name: 装依赖
        run: pnpm install

      - name: 装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc,i686-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: 编 x64
        run: pnpm run tauri build --target x86_64-pc-windows-msvc

      - name: 编 x86
        run: pnpm run tauri build --target i686-pc-windows-msvc

      - name: 编 ARM64
        run: pnpm run tauri build --target aarch64-pc-windows-msvc

      - name: 收 Windows 包
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./release-upload/windows
          foreach ($target in @("x86_64-pc-windows-msvc", "i686-pc-windows-msvc", "aarch64-pc-windows-msvc")) {
            foreach ($ext in @("msi", "exe")) {
              $path = "src-tauri/target/$target/release/bundle/*/*.$ext"
              Copy-Item $path ./release-upload/windows/ -ErrorAction SilentlyContinue
            }
          }

      - name: 传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-all
          path: ./release-upload/windows/*
          retention-days: 1

  release:
    needs: [prepare, build-macos, build-linux, build-windows]
    if: |
      always() && 
      (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped') &&
      (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped') &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: 删旧 Release（如需）
        if: ${{ inputs.force_recreate == true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          gh release delete "$VERSION" --yes 2>/dev/null || true
          git push origin :refs/tags/$VERSION 2>/dev/null || true

      - name: 发 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.title }}
          body: |
            > 构建完成，请编辑此 Release 添加更新说明。
            
            - 版本：${{ needs.prepare.outputs.version }}
            - 构建编号：${{ github.run_id }}
          files: ./artifacts/**/*
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, 'beta') || contains(needs.prepare.outputs.version, 'alpha') || contains(needs.prepare.outputs.version, 'rc') }}
          generate_release_notes: false
