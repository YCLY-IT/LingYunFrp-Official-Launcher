name: Build Project and Release

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Select platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - macos
          - linux
          - windows
      create_release:
        description: "Create GitHub Release"
        required: false
        default: false
        type: boolean

jobs:
  # ==================== macOS (x64 + ARM64 + Universal) ====================
  build-macos:
    if: ${{ github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' }}
    runs-on: macos-latest
    steps:
      - name: Checkout Private Repository
        uses: actions/checkout@v4
        with:
          repository: YCLY-IT/LingYunFrp-Client-Launcher
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      # Build x64
      - name: Build Tauri (x64)
        run: pnpm run tauri build --target x86_64-apple-darwin
        
      - name: Rename x64 dmg
        run: |
          cd src-tauri/target/x86_64-apple-darwin/release/bundle/dmg
          for f in *.dmg; do mv "$f" "${f%.dmg}_x64.dmg"; done

      # Build ARM64
      - name: Build Tauri (ARM64)
        run: pnpm run tauri build --target aarch64-apple-darwin
        
      - name: Rename aarch64 dmg
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/dmg
          for f in *.dmg; do mv "$f" "${f%.dmg}_aarch64.dmg"; done

      # Build Universal
      - name: Build Tauri (Universal)
        run: pnpm run tauri build --target universal-apple-darwin
        
      - name: Rename universal dmg
        run: |
          cd src-tauri/target/universal-apple-darwin/release/bundle/dmg
          for f in *.dmg; do mv "$f" "${f%.dmg}_universal.dmg"; done

      # 打包所有 macOS 产物
      - name: Package macOS artifacts
        run: |
          mkdir -p ./release-upload/macos
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*_x64.dmg ./release-upload/macos/ 2>/dev/null || true
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz ./release-upload/macos/ 2>/dev/null || true
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*_aarch64.dmg ./release-upload/macos/ 2>/dev/null || true
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz ./release-upload/macos/ 2>/dev/null || true
          cp src-tauri/target/universal-apple-darwin/release/bundle/dmg/*_universal.dmg ./release-upload/macos/ 2>/dev/null || true
          cp src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz ./release-upload/macos/ 2>/dev/null || true
          ls -la ./release-upload/macos/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-all
          path: ./release-upload/macos/*
          retention-days: 1

  # ==================== Linux (x64 + ARM64) ====================
  build-linux:
    if: ${{ github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Private Repository
        uses: actions/checkout@v4
        with:
          repository: YCLY-IT/LingYunFrp-Client-Launcher
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          
      - name: Install dependencies
        run: pnpm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      # ==================== Build x64 ====================
      - name: Install system dependencies (x64)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build Tauri (x64)
        run: pnpm run tauri build --target x86_64-unknown-linux-gnu

      # ==================== Build ARM64 ====================
      - name: Setup ARM64 cross compilation
        run: |
          sudo dpkg --add-architecture arm64
          sudo cp /etc/apt/sources.list /etc/apt/sources.list.backup
          sudo tee /etc/apt/sources.list > /dev/null <<'EOF'
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu  jammy main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu  jammy-updates main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu  jammy-backports main restricted universe multiverse
          deb [arch=amd64] http://security.ubuntu.com/ubuntu  jammy-security main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports  jammy main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports  jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports  jammy-backports main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports  jammy-security main restricted universe multiverse
          EOF
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            pkg-config-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            patchelf \
            perl \
            wget

      - name: Build OpenSSL for ARM64
        run: |
          OPENSSL_VERSION="3.2.1"
          wget -q https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz
          tar xzf openssl-${OPENSSL_VERSION}.tar.gz
          cd openssl-${OPENSSL_VERSION}
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++
          ./Configure linux-aarch64 shared --prefix=/opt/openssl-arm64 --openssldir=/opt/openssl-arm64
          make -j$(nproc)
          sudo make install
          echo "OPENSSL_DIR=/opt/openssl-arm64" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/opt/openssl-arm64/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=/opt/openssl-arm64/lib" >> $GITHUB_ENV
          sudo mkdir -p /opt/openssl-arm64/lib/pkgconfig
          sudo tee /opt/openssl-arm64/lib/pkgconfig/openssl.pc > /dev/null <<EOF
          prefix=/opt/openssl-arm64
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: OpenSSL
          Description: Secure Sockets Layer and cryptography libraries and tools
          Version: 3.2.1
          Libs: -L\${libdir} -lssl -lcrypto
          Cflags: -I\${includedir}
          EOF
          sudo tee /opt/openssl-arm64/lib/pkgconfig/libssl.pc > /dev/null <<EOF
          prefix=/opt/openssl-arm64
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: OpenSSL-libssl
          Description: Secure Sockets Layer and cryptography libraries
          Version: 3.2.1
          Libs: -L\${libdir} -lssl
          Cflags: -I\${includedir}
          EOF
          sudo tee /opt/openssl-arm64/lib/pkgconfig/libcrypto.pc > /dev/null <<EOF
          prefix=/opt/openssl-arm64
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: OpenSSL-libcrypto
          Description: OpenSSL cryptography library
          Version: 3.2.1
          Libs: -L\${libdir} -lcrypto
          Cflags: -I\${includedir}
          EOF

      - name: Install Tauri dependencies (ARM64)
        run: |
          sudo apt-get install -y \
            libgtk-3-dev:arm64 \
            libglib2.0-dev:arm64 \
            libsoup-3.0-dev:arm64 \
            libwebkit2gtk-4.1-dev:arm64 \
            libjavascriptcoregtk-4.1-dev:arm64 \
            libayatana-appindicator3-dev:arm64 \
            librsvg2-dev:arm64 \
            libssl-dev:arm64 || true

      - name: Configure Cargo for ARM64
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          [env]
          PKG_CONFIG_ALLOW_CROSS = "1"
          PKG_CONFIG_SYSROOT_DIR = "/usr/aarch64-linux-gnu"
          OPENSSL_STATIC = "1"
          OPENSSL_DIR = "/opt/openssl-arm64"
          OPENSSL_INCLUDE_DIR = "/opt/openssl-arm64/include"
          OPENSSL_LIB_DIR = "/opt/openssl-arm64/lib"
          PKG_CONFIG_PATH = "/opt/openssl-arm64/lib/pkgconfig:/usr/lib/aarch64-linux-gnu/pkgconfig"
          EOF

      - name: Build Tauri (ARM64)
        run: pnpm run tauri build --target aarch64-unknown-linux-gnu
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_SYSROOT_DIR: "/usr/aarch64-linux-gnu"
          OPENSSL_STATIC: "1"
          OPENSSL_DIR: "/opt/openssl-arm64"
          OPENSSL_INCLUDE_DIR: "/opt/openssl-arm64/include"
          OPENSSL_LIB_DIR: "/opt/openssl-arm64/lib"
          PKG_CONFIG_PATH: "/opt/openssl-arm64/lib/pkgconfig:/usr/lib/aarch64-linux-gnu/pkgconfig"
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g++

      # 打包 Linux 产物
      - name: Package Linux artifacts
        run: |
          mkdir -p ./release-upload/linux
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb ./release-upload/linux/ 2>/dev/null || true
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage ./release-upload/linux/ 2>/dev/null || true
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm ./release-upload/linux/ 2>/dev/null || true
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/tar.gz/*.tar.gz ./release-upload/linux/ 2>/dev/null || true
          cp src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb ./release-upload/linux/ 2>/dev/null || true
          cp src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage ./release-upload/linux/ 2>/dev/null || true
          cp src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm/*.rpm ./release-upload/linux/ 2>/dev/null || true
          cp src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/tar.gz/*.tar.gz ./release-upload/linux/ 2>/dev/null || true
          ls -la ./release-upload/linux/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-all
          path: ./release-upload/linux/*
          retention-days: 1

  # ==================== Windows (x64 + x86 + ARM64) ====================
  build-windows:
    if: ${{ github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - name: Checkout Private Repository
        uses: actions/checkout@v4
        with:
          repository: YCLY-IT/LingYunFrp-Client-Launcher
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          
      - name: Install dependencies
        run: pnpm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc,i686-pc-windows-msvc,aarch64-pc-windows-msvc

      # Build x64
      - name: Build Tauri (x64)
        run: pnpm run tauri build --target x86_64-pc-windows-msvc

      # Build x86
      - name: Build Tauri (x86)
        run: pnpm run tauri build --target i686-pc-windows-msvc

      # Build ARM64
      - name: Build Tauri (ARM64)
        run: pnpm run tauri build --target aarch64-pc-windows-msvc

      # 打包 Windows 产物
      - name: Package Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./release-upload/windows
          Copy-Item -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi" -Destination "./release-upload/windows/" -ErrorAction SilentlyContinue
          Copy-Item -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe" -Destination "./release-upload/windows/" -ErrorAction SilentlyContinue
          Copy-Item -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/zip/*.zip" -Destination "./release-upload/windows/" -ErrorAction SilentlyContinue
          Copy-Item -Path "src-tauri/target/i686-pc-windows-msvc/release/bundle/msi/*.msi" -Destination "./release-upload/windows/" -ErrorAction SilentlyContinue
          Copy-Item -Path "src-tauri/target/i686-pc-windows-msvc/release/bundle/nsis/*.exe" -Destination "./release-upload/windows/" -ErrorAction SilentlyContinue
          Copy-Item -Path "src-tauri/target/i686-pc-windows-msvc/release/bundle/zip/*.zip" -Destination "./release-upload/windows/" -ErrorAction SilentlyContinue
          Copy-Item -Path "src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi" -Destination "./release-upload/windows/" -ErrorAction SilentlyContinue
          Copy-Item -Path "src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe" -Destination "./release-upload/windows/" -ErrorAction SilentlyContinue
          Copy-Item -Path "src-tauri/target/aarch64-pc-windows-msvc/release/bundle/zip/*.zip" -Destination "./release-upload/windows/" -ErrorAction SilentlyContinue
          Get-ChildItem ./release-upload/windows/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-all
          path: ./release-upload/windows/*
          retention-days: 1

  # ==================== 发布 Release（收集所有产物） ====================
  release:
    needs: [build-macos, build-linux, build-windows]
    if: |
      always() && 
      (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped') &&
      (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped') &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') &&
      ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event.inputs.create_release == true)
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find ./artifacts -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
